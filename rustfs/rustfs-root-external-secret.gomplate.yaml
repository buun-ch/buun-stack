apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rustfs
  namespace: {{ .Env.RUSTFS_NAMESPACE }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: rustfs
    creationPolicy: Owner
  data:
    - secretKey: access-key
      remoteRef:
        key: rustfs/admin
        property: access_key
    - secretKey: secret-key
      remoteRef:
        key: rustfs/admin
        property: secret_key
