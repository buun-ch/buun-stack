# DataHub Prerequisites Values
# External services required by DataHub

# MySQL disabled - using PostgreSQL
mysql:
  enabled: false

# PostgreSQL configuration (external)
postgresql:
  enabled: false

# Elasticsearch configuration
elasticsearch:
  enabled: true
  replicas: 1
  minimumMasterNodes: 1
  # Use newer version to fix cgroup v2 compatibility (7.17.3 → 7.17.26)
  image: "docker.elastic.co/elasticsearch/elasticsearch"
  imageTag: "7.17.26"
  # Resource limits for development
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  # Persistence
  persistence:
    enabled: true
    size: "10Gi"
  # Security configuration
  esConfig:
    elasticsearch.yml: |
      xpack.security.enabled: false
      xpack.security.transport.ssl.enabled: false
      xpack.security.http.ssl.enabled: false

# Kafka configuration (KRaft mode - Zookeeper-less)
kafka:
  enabled: true
  # KRaft controller nodes act as combined controller+broker
  controller:
    replicaCount: 1
    # Keep JVM heap within the memory limit to avoid OOMKill
    heapOpts: -Xmx512m -Xms512m
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
    persistence:
      enabled: true
      size: "10Gi"
  # KRaft mode replaces Zookeeper
  kraft:
    enabled: true
  zookeeper:
    enabled: false

# Schema Registry
cp-schema-registry:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"