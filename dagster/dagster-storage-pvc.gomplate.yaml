apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dagster-storage-pvc
  namespace: {{ .Env.DAGSTER_NAMESPACE }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- $sc := getenv "STORAGE_CLASS" "" }}
  {{- if $sc }}
  storageClassName: {{ $sc }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Env.DAGSTER_STORAGE_SIZE }}
